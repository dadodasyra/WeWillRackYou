services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: wewillrackyou
      POSTGRES_PASSWORD: wewillrackyou
      POSTGRES_DB: wewillrackyou
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wewillrackyou -d wewillrackyou"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://wewillrackyou:wewillrackyou@db:5432/wewillrackyou
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-production}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
